name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package zip
        run: |
          mkdir artifact
          copy target\release\zero_mapper.exe artifact\ZeroMapper.exe
          copy config.toml artifact\config.toml
          Compress-Archive -Path artifact\* -DestinationPath ZeroMapper-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ZeroMapper-${{ github.ref_name }}.zip
          generate_release_notes: true
